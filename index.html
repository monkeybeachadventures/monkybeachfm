<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monkey Beach FM</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* HET TROPISCHE DESIGN VAN JOUW RADIOSTATION */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .player-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 320px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        h2 {
            margin: 0 0 30px 0;
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.8;
        }

        .track-info {
            background: rgba(0, 0, 0, 0.1);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        #track-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        #status {
            font-size: 0.85rem;
            opacity: 0.7;
        }

        /* STANDAARD KNOPPEN STYLING (DAGMODUS BRUIN) */
        .controls button, #install-btn, #cast-btn {
            background: #82462a;
            border: none;
            color: #f0b661;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.3s, color 0.3s;
        }

        #install-btn, #cast-btn {
            padding: 12px 24px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: inline-block;
        }

        #cast-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .controls button:hover, #install-btn:hover, #cast-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .controls button:active, #install-btn:active, #cast-btn:active {
            transform: scale(0.95);
        }

        /* DE STYLING VOOR JOUW EILAND-NACHT */
        body.nacht-modus {
            background: linear-gradient(135deg, #0B132B, #1C2541, #3A506B);
        }

        body.nacht-modus .player-container {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        body.nacht-modus .controls button, 
        body.nacht-modus #install-btn, 
        body.nacht-modus #cast-btn {
            background: #1C2541;
            color: #5BC0BE;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        body.nacht-modus #theme-btn {
            border: 1px solid rgba(91, 192, 190, 0.4) !important;
            color: #5BC0BE !important;
        }
    </style>
</head>

            { title: "Monkey Beach FM Weerbericht", url: "https://www.dropbox.com/scl/fi/unsbto8zgcuzz9b8s1q3o/Weerbericht-nacht.mp3?rlkey=uro3clseo02of53jhyyyw3sgl&st=v09fd9kj&raw=1", periode: "avond" },
            { title: "Chennot Glenn Su - Palm Tide", url: "https://www.dropbox.com/scl/fi/5ng1zrfyuh7qx4bhvksh5/Palm-Tide.mp3?rlkey=z9dq06lrandipj1c6vs4ddlrr&st=vk5w668g&raw=1", periode: "avond" }
        ];

        // ========================================================
        // 2. TIMING EN GEPROGRAMMEERDE AFSPREEL-LOGICA
        // ========================================================
        const audioPlayer = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const trackTitle = document.getElementById('track-title');
        const statusDisplay = document.getElementById('status');

        let isPlaying = false;
        let backgroundAudioCtx = null;
        let vorigNummerUrl = ""; 
        let errorTimeout = null;

        audioPlayer.preload = "auto";

        function startAchtergrondAudioHack() {
            try {
                if (!backgroundAudioCtx) {
                    backgroundAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const buffer = backgroundAudioCtx.createBuffer(1, 1, 22050);
                    const source = backgroundAudioCtx.createBufferSource();
                    source.buffer = buffer;
                    source.loop = true;
                    source.connect(backgroundAudioCtx.destination);
                    source.start(0);
                } else if (backgroundAudioCtx.state === 'suspended') {
                    backgroundAudioCtx.resume();
                }
            } catch(e) {
                console.log("Hack kon niet starten:", e);
            }
        }

        // Haal een random track op uit de juiste periode
        function getRandomTrack() {
            const huidigUur = new Date().getHours();
            let huidigePeriode = "altijd";

            // CORRECTIE: Tijden logisch ingedeeld en hoofdletterongevoelig gemaakt
            if (huidigUur >= 4 && huidigUur < 5) {
                huidigePeriode = "ochtend"; 
            } else if (huidigUur >= 5 && huidigUur < 23) {
                huidigePeriode = "middag";  
            } else {
                huidigePeriode = "avond";   
            }

            const gefilterdeLijst = playlist.filter(track => {
                return track.periode.toLowerCase() === huidigePeriode.toLowerCase() || track.periode.toLowerCase() === "altijd";
            });

            // Als de gefilterde lijst leeg is (bijv. in de ochtend), pakken we de hele playlist
            const uiteindelijkeLijst = gefilterdeLijst.length > 0 ? gefilterdeLijst : playlist;

            let randomIndex;
            let pogingen = 0; // Extra beveiliging tegen infinite loops
            
            do {
                randomIndex = Math.floor(Math.random() * uiteindelijkeLijst.length);
                pogingen++;
            } while (uiteindelijkeLijst[randomIndex].url === vorigNummerUrl && uiteindelijkeLijst.length > 1 && pogingen < 10);

            return uiteindelijkeLijst[randomIndex];
        }

        function playRandomTrack() {
            if (playlist.length === 0) return;

            if (errorTimeout) {
                clearTimeout(errorTimeout);
                errorTimeout = null;
            }

            const currentTrack = getRandomTrack();
            vorigNummerUrl = currentTrack.url; 

            let streamUrl = currentTrack.url.replace("dl=0", "raw=1");
            audioPlayer.src = streamUrl;
            trackTitle.innerText = currentTrack.title;
            statusDisplay.innerText = "Volgende nummer laden...";

            audioPlayer.load();

            if (isPlaying) {
                let playPromise = audioPlayer.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        statusDisplay.innerText = "Nu aan het afspelen";
                        activeerWakeLock();
                        updateMediaSession(currentTrack);
                    }).catch(error => {
                        console.log("Dropbox dip, herstarten...", error);
                        if (document.visibilityState === 'visible') {
                            errorTimeout = setTimeout(playRandomTrack, 2000);
                        }
                    });
                }
            }
        }

        function togglePlay() {
            startAchtergrondAudioHack();

            if (vorigNummerUrl === "") {
                const eersteTrack = getRandomTrack();
                vorigNummerUrl = eersteTrack.url;
                audioPlayer.src = eersteTrack.url.replace("dl=0", "raw=1");
                trackTitle.innerText = eersteTrack.title;
                audioPlayer.load();
            }

            if (isPlaying) {
                audioPlayer.pause();
                playBtn.innerText = "Afspelen";
                statusDisplay.innerText = "Gepauzeerd";
                isPlaying = false;
                stopWakeLock();
            } else {
                statusDisplay.innerText = "Verbinden...";
                audioPlayer.play().then(() => {
                    playBtn.innerText = "Stop";
                    statusDisplay.innerText = "Nu aan het afspelen";
                    isPlaying = true;
                    activeerWakeLock();
                    
                    const huidigeTrack = playlist.find(t => t.url === vorigNummerUrl) || playlist[0];
                    updateMediaSession(huidigeTrack);
                }).catch(error => {
                    console.log("Afspeelfout bij klik, proberen we opnieuw:", error);
                    isPlaying = true; 
                    playRandomTrack();
                });
            }
        }

        audioPlayer.onended = function() {
            statusDisplay.innerText = "Volgend nummer kiezen...";
            playRandomTrack();
        };

        audioPlayer.onerror = function() {
            console.log("Audio-fout opgetreden, herstellen...");
            statusDisplay.innerText = "Verbinding herstellen...";
            if (errorTimeout) clearTimeout(errorTimeout);
            
            if (document.visibilityState === 'visible' && isPlaying) {
                errorTimeout = setTimeout(playRandomTrack, 2000);
            }
        };

       window.onload = function() {
    if(playlist.length > 0) {
        trackTitle.innerText = "Monkey Beach FM";
        statusDisplay.innerText = "Klik op afspelen om te beginnen";
        playBtn.disabled = false;
        playBtn.innerText = "Afspelen";
    }
    // DIT VOEGEN WE TOE: Zorgt dat Google Cast direct paraat staat op GitHub Pages
    laadGoogleCastVeilig(); 
};

        // ========================================================
        // 3. CODE VOOR DE APP-INSTALLATIE KNOP
        // ========================================================
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        function controleerAppModus() {
            const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
            if (isPWA) {
                installBtn.style.display = 'none';
            }
        }

        window.addEventListener('DOMContentLoaded', controleerAppModus);

        window.addEventListener('beforeinstallprompt', (e) => {
            if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
                installBtn.style.display = 'none';
                return;
            }
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'inline-block';
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        installBtn.style.display = 'none';
                    }
                    deferredPrompt = null;
                });
            } else {
                alert("Hoe te installeren:\n\n• iPhone (Safari): Tik onderin op de Deel-knop en kies 'Zet op beginscherm'.\n\n• Android: Tik rechtsboven op de 3 stipjes en kies 'App installeren'.");
            }
        }

        if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        // We vertellen de browser nu exact in welke submap de app leeft
        navigator.serviceWorker.register('/monkeybeachfm/sw.js', { scope: '/monkeybeachfm/' })
        .then(() => console.log("Service Worker succesvol geregistreerd voor GitHub!"))
        .catch(err => console.log("SW fout:", err));
    });
}

        // ========================================================
        // 4. GOOGLE CAST LOGICA
        // ========================================================
        let castSession = null;

        function laadGoogleCastVeilig() {
            const script = document.createElement('script');
            script.src = "https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1";
            document.head.appendChild(script);
        }

        window.__onGCastApiAvailable = function(isAvailable) {
            if (isAvailable) initializeCastApi();
        };

        function initializeCastApi() {
            const context = cast.framework.CastContext.getInstance();
            context.setOptions({
                receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
                autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGINAL_SCOPED
            });

            context.addEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED, (event) => {
                if (event.sessionState === cast.framework.SessionState.SESSION_STARTED) {
                    castSession = context.getCurrentSession();
                    if (vorigNummerUrl === "") playRandomTrack();
                    else {
                        const huidigeTrack = playlist.find(t => t.url === vorigNummerUrl);
                        if(huidigeTrack) castMedia(huidigeTrack);
                    }
                }
            });
        }

        function startCasting() {
            const context = cast.framework.CastContext.getInstance();
            context.requestSession().then(() => {
                castSession = context.getCurrentSession();
                if (vorigNummerUrl !== "") {
                    const huidigeTrack = playlist.find(t => t.url === vorigNummerUrl);
                    if(huidigeTrack) castMedia(huidigeTrack);
                }
                else playRandomTrack();
            }).catch(err => console.log(err));
        }

        function castMedia(track) {
            if (!castSession) return;
            let streamUrl = track.url.replace("dl=0", "raw=1");
            const mediaInfo = new chrome.cast.media.MediaInfo(streamUrl, 'audio/mp3');
            mediaInfo.metadata = new chrome.cast.media.MusicTrackMediaMetadata();
            mediaInfo.metadata.title = track.title;
            mediaInfo.metadata.artist = "Monkey Beach FM";
            const request = new chrome.cast.media.LoadRequest(mediaInfo);
            castSession.getSessionObj().loadMedia(request, () => {}, err => console.log(err));
        }

        // ========================================================
        // 5. ACHTERGROND & AUDIO STABILITEIT
        // ========================================================
        let wakeLock = null;

        async function activeerWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.log('Wake Lock mislukt:', err.message);
            }
        }

        function stopWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        function updateMediaSession(track) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: track.title,
                    artist: 'Monkey Beach FM',
                    album: 'Tropische Radio',
                    artwork: [
                        { src: 'https://www.dropbox.com/scl/fi/ylv6eshe0zigzxw5f8p97/mbfm-logo.png?rlkey=iwup6qewkfilix8e6hvi4ixvu&st=c78h815d&raw=1', sizes: '512x512', type: 'image/png' }
                    ]
                });

                navigator.mediaSession.setActionHandler('nexttrack', () => { playRandomTrack(); });
                navigator.mediaSession.setActionHandler('play', () => { togglePlay(); });
                navigator.mediaSession.setActionHandler('pause', () => { togglePlay(); });
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && isPlaying) {
                activeerWakeLock();
                startAchtergrondAudioHack();
                if (audioPlayer.paused && isPlaying) {
                    playRandomTrack();
                }
            }
        });

        function updateGroet() {
            const uur = new Date().getHours();
            const ondertitel = document.querySelector('h2');
            if (uur >= 6 && uur < 12) ondertitel.innerText = "Goedemorgen! Start je dag tropisch met Monkey Beach FM! ☀️";
            else if (uur >= 12 && uur < 18) ondertitel.innerText = "Fijne middag! Monkey Beach FM, De soundtrack van jouw eilandavontuur 🌴";
            else if (uur >= 18 && uur < 24) ondertitel.innerText = "Goedenavond! Geniet van je avond met Monkey Beach FM 🍹";
            else ondertitel.innerText = "Geniet van de wondere nacht op dit magische eiland met Monkey Beach FM 🌙";
        }
        window.addEventListener('DOMContentLoaded', updateGroet);

        // ========================================================
        // 6. EILAND-MODUS (NACHTMODUS) LOGICA
        // ========================================================
        const themeBtn = document.getElementById('theme-btn');

        function toggleEilandModus() {
            document.body.classList.toggle('nacht-modus');
            const isNacht = document.body.classList.contains('nacht-modus');
            
            if (isNacht) {
                themeBtn.innerHTML = "☀️ Dag-Modus inschakelen";
                localStorage.setItem('eiland-thema', 'nacht');
            } else {
                themeBtn.innerHTML = "🌙 Donkere-Modus inschakelen";
                localStorage.setItem('eiland-thema', 'dag');
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const opgeslagenThema = localStorage.getItem('eiland-thema');
            if (opgeslagenThema === 'nacht') {
                document.body.classList.add('nacht-modus');
                themeBtn.innerHTML = "☀️ Dag-Modus inschakelen";
            }
        });
    </script>
