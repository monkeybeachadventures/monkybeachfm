<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monkey Beach FM</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* FULLSCREEN TROPISCHE INTERFACE */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* overflow weghalen bij body zodat we eventuele zwarte balken op TV netjes opvangen */
            font-family: 'Courier New', Courier, monospace; /* Typmachine stijl voor de hele site */
            background-color: #120a05;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* De magische achtergrondafbeelding */
        .scenery-container {
            position: relative;
            width: 100vw;
            
            /* Dwingt de container in de exacte 16:9 verhouding van jouw Dropbox-afbeelding */
            height: 56.25vw; 
            
            background: url('https://www.dropbox.com/scl/fi/qms6n1x04bfkc8pmxcai0/site-visual-design.png?rlkey=nokkkd2zsvx59sqs4ojjm9s7j&st=uwabvw7z&raw=1') center center no-repeat;
            background-size: contain;
            overflow: hidden; /* Zorgt dat elementen niet buiten de strandsfeer kunnen breken */
        }

       /* 1A. HET DIGITALE DISPLAY VAN DE RADIO (TITEL + STATUS) */
        .radio-display {
            position: absolute;
            top: 36%;          
            left: 40%;      
            transform: translate(-50%, -50%);
            width: 18%;       
            height: auto;       /* Veranderd van 8% naar auto zodat het vak flexibel meegroeit als er 2 regels zijn */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #fce19a;
            text-shadow: 0 0 8px rgba(252, 225, 154, 0.6);
            box-sizing: border-box;
        }

        /* 1B. DE LOSSE OVERLAY VOOR DE ROUNDE PLAY-KNOP */
        .radio-button-overlay {
            position: absolute;
            top: 54.6%; /* Positie van de knop (omhoog/omlaag) - staat nu los van de tekst! */
            left: 33.5%;    /* Positie van de knop (links/rechts) */
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            /* border: 1px solid blue; */ /* Haal de /* weg om te zien waar de knop staat */
        }

        #track-title {
            font-size: 1.1vw;   /* Ietsjes kleiner gezet zodat langere titels sneller passen */
            font-weight: bold;
            margin-bottom: 5px;
            /* OUDE INSTELLINGEN WEGGEHAALD (nowrap en ellipsis) */
            word-wrap: break-word; /* Zorgt dat extreem lange woorden netjes worden afgebroken */
            line-height: 1.2;      /* Zorgt voor een mooie afstand tussen de twee regels tekst */
            width: 100%;
        }

        #status {
            font-size: 0.8vw;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #play-btn {
            background: rgba(240, 182, 97, 0.2);
            border: 2px solid #f0b661;
            color: #fce19a;
            width: 2vw;
            height: 2vw;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: inset 0 0 10px rgba(240, 182, 97, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0; /* Marges zijn niet meer nodig door de losse koppeling */
        }

        

        #play-btn:hover:not(:disabled) {
            background: rgba(240, 182, 97, 0.4);
            box-shadow: 0 0 15px rgba(240, 182, 97, 0.6);
        }

        /* 2. OVERLAY OP HET TYPMACINE BRIEFJE */
        .typewriter-paper {
            position: absolute;
            top: 45%;
            left: 70%;
            transform: translate(-50%, -50%) rotate(5deg); /* Draait mee met de stand van het papier! */
            width: 10%;
            
            /* AANPASSING: Hoogte flexibel maken zodat tekst die onder elkaar springt de ruimte heeft! */
            height: auto; 
            max-height: 22%; /* Beveiliging zodat het nooit té lang wordt voor het briefje */
            
            box-sizing: border-box;
            padding: 5px;
            color: #3a2d22; /* Ouderwetse inkt-kleur */
            text-align: left;
            overflow: visible; /* Zorgt dat we alles kunnen blijven zien */
        }

        .history-title {
            font-weight: bold;
            font-size: 0.9vw;    /* Subtiel verkleind zodat het makkelijker past */
            line-height: 1.2;    /* Zorgt voor een mooie afstand tussen afgebroken regels */
            display: block;      /* Zorgt dat het element zich als een blok gedraagt */
            border-bottom: 1px dashed #3a2d22;
            padding-bottom: 3px;
            margin-bottom: 8px;  /* Ruimte onder de titel */
            text-transform: uppercase;
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .history-item {
            font-size: 0.75vw;
            line-height: 1.3;
            
            /* AANPASSING: Dwing de tekst om naar de volgende regel te springen in plaats van afkappen */
            white-space: normal !important; 
            word-wrap: break-word;          
            overflow: visible !important;   
            
            display: block;
            margin-bottom: 8px; /* Iets meer ruimte tussen de nummers onderling voor leesbaarheid */
        }

     /* 3. VERSTEKEN KNOPPEN IN HET OPENGESLAGEN BOEK */
        .book-container {
            position: absolute;
            bottom: 8%;        /* Hoe ver de knoppen van de ONDERKANT van het scherm staan */
            left: 49.2%;  /* Hoe ver de knoppen van de LINKERKANT van het scherm staan */
            transform: translateX(-50%);
            width: 30%;      /* De totale breedte die de twee kaders samen innemen */
            height: 16%;       /* De hoogte van de kaders */
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            /* border: 1px solid red; */ /* HULPLIJN: Haal de /* weg om te zien waar het vak nu staat */
        }

        /* De onzichtbare kaders die precies over de boekvlakken vallen */
        .book-frame {
            width: 46%;
            height: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* NIEUW: Geef de linkerpagina een lichte draai naar links */
        .book-container .book-frame:nth-child(1) button {
            transform: rotate(5.5deg);
        }

        /* NIEUW: Geef de rechterpagina een lichte draai naar rechts */
        .book-container .book-frame:nth-child(2) button {
            transform: rotate(-4.5deg);
        }

        .book-frame button {
            background: transparent;
            border: none;
            width: 100%;
            height: 100%;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 0.9vw;
            color: #2b4539; /* Vintage zeemansgroen/blauw */
            text-transform: uppercase;
            transition: transform 0.2s, color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center; /* Zorgt dat de tekst netjes gecentreerd blijft na draaien */
            padding: 10px;
        }

        /* Aangepaste hover: Alleen de kleur verandert, de tekst blijft strak en stil staan */
        .book-container .book-frame:nth-child(1) button:hover {
            color: #11221a;
        }
        .book-container .book-frame:nth-child(2) button:hover {
            color: #11221a;
        }

        /* Responsiviteits-aanpassing voor hele kleine schermen */
        @media (max-aspect-ratio: 4/3) {
            #track-title { font-size: 1.5vw; }
            #play-btn { font-size: 1.3vw; }
            .history-title { font-size: 1.2vw; }
            .history-item { font-size: 1vw; }
            .book-frame button { font-size: 1.2vw; }
        }

/* 4. POSITIE EN GROOTTE VAN DE POSTER */
        .custom-poster {
            position: absolute;
            top: 11%;          /* Hoe ver de poster van de BOVENKANT van het scherm staat */
            left: 48%;        /* Hoe ver de poster van de LINKERKANT van het scherm staat */
            width: 5vw;       /* De breedte van de poster (schaalt mee met het scherm) */
            height: auto;      /* De hoogte past zich automatisch aan om de verhouding te bewaren */
            
            /* Optioneel: Geeft een vintage retro schaduw alsof de poster echt op de muur zit */
            box-shadow: 2px 4px 10px rgba(0, 0, 0, 0.3); 
            
            /* Zorgt ervoor dat je niet per ongeluk de poster selecteert bij het klikken */
            pointer-events: none; 
        }

/* 5. DE STYLING VAN DE RETRO VLAM */
        .lamp-flame {
            position: absolute;
            /* --- POSITIE: Schuif hiermee de vlam precies op het lontje --- */
            top: 54.9%;          /* Hoe ver van de bovenkant */
            left: 17%;         /* Hoe ver van de linkerkant */
            transform: translate(-50%, -50%);
            
            /* --- VORM EN KLEUR VAN DE VLAM --- */
            width: 14px;
            height: 38px;
            background: linear-gradient(to bottom, #fff 0%, #ffde6a 40%, #ff7b00 80%, rgba(255, 60, 0, 0) 100%);
            border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%; /* Maakt een traanvormige vlam */
            
            /* Warm pulserend omgevingslicht rondom de lamp */
            box-shadow: 0 0 20px #ff9d00, 0 0 40px rgba(255, 157, 0, 0.6), inset 0 0 4px #ffffff;
            
            /* Activeer de flakker-animatie (duurt 0.15 seconden en herhaalt oneindig) */
            animation: flicker 0.5s infinite alternate;
            pointer-events: none; /* Je kunt er gewoon "doorheen" klikken */
            opacity: 0.9;
        }

        /* --- DE FLAKKER ANIMATIE (DE MAGIE) --- */
        @keyframes flicker {
            0% {
                transform: translate(-50%, -50%) scale(0.96) rotate(-1deg);
                box-shadow: 0 0 18px #ff9d00, 0 0 35px rgba(255, 157, 0, 0.5), inset 0 0 4px #ffffff;
                opacity: 0.85;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.04) rotate(1deg);
                box-shadow: 0 0 25px #ffb700, 0 0 45px rgba(255, 183, 0, 0.7), inset 0 0 5px #ffffff;
                opacity: 0.95;
            }
        }


    </style>
</head>

        const audioPlayer = document.getElementById('audio-player');

        const statusDisplay = document.getElementById('status');

        let isPlaying = false;

        audioPlayer.preload = "auto";

        function startAchtergrondAudioHack() {
            try {
                if (!backgroundAudioCtx) {
                    backgroundAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const buffer = backgroundAudioCtx.createBuffer(1, 1, 22050);
                    const source = backgroundAudioCtx.createBufferSource();
                    source.buffer = buffer;
                    source.loop = true;
                    source.connect(backgroundAudioCtx.destination);
                    source.start(0);
                } else if (backgroundAudioCtx.state === 'suspended') {
                    backgroundAudioCtx.resume();
                }
            } catch(e) {}
        }

        function getRandomTrack() {
            const nu = new Date();
            const maand = nu.getMonth() + 1;
            const dag = nu.getDate();
            const huidigUur = nu.getHours();
            
            let actiefSeizoen = "normaal";

// HALLOWEEN: Vanaf 25 oktober t/m 31 oktober (Oktober = maand 10)
if (maand === 10 && dag >= 25) {
    actiefSeizoen = "halloween";
} 
// OUDJAARSDAG: Alleen op 31 december
else if (maand === 12 && dag === 31) {
    actiefSeizoen = "oudjaar";
}
// KERST: Vanaf 8 november (maand 11) t/m 30 december (maand 12) EN 1 januari (maand 1)
else if ((maand === 11 && dag >= 8) || maand === 12 || (maand === 1 && dag === 1)) {
    actiefSeizoen = "kerst";
}

            let huidigePeriode = "altijd";
            if (huidigUur >= 4 && huidigUur < 5) huidigePeriode = "ochtend"; 
            else if (huidigUur >= 5 && huidigUur < 23) huidigePeriode = "middag";  
            else huidigePeriode = "avond";   

            const gefilterdeLijst = playlist.filter(track => {
                const pastBijTijd = (track.periode.toLowerCase() === huidigePeriode.toLowerCase() || track.periode.toLowerCase() === "altijd");
                let pastBijSeizoen = false;
                if (actiefSeizoen === "normaal") {
                    pastBijSeizoen = (track.specialePeriode === "normaal" || !track.specialePeriode);
                } else {
                    pastBijSeizoen = (track.specialePeriode === "normaal" || !track.specialePeriode || track.specialePeriode === actiefSeizoen);
                }
                return pastBijTijd && pastBijSeizoen;
            });

            const uiteindelijkeLijst = gefilterdeLijst.length > 0 ? gefilterdeLijst : playlist;
            const geschiedenisLimiet = Math.min(15, Math.floor(uiteindelijkeLijst.length / 2));

            let gekozenTrack;
            let pogingen = 0;
            
            do {
                const randomIndex = Math.floor(Math.random() * uiteindelijkeLijst.length);
                gekozenTrack = uiteindelijkeLijst[randomIndex];
                pogingen++;
            } while (afspeelGeschiedenis.includes(gekozenTrack.url) && pogingen < 40);

            afspeelGeschiedenis.push(gekozenTrack.url);
            if (afspeelGeschiedenis.length > geschiedenisLimiet) afspeelGeschiedenis.shift();

            return gekozenTrack;
        }

        function updateGeschiedenisLijst(nieuweAfgelopenTrackTitel) {
            if (nieuweAfgelopenTrackTitel.includes("Monkey Beach FM") || nieuweAfgelopenTrackTitel.toLowerCase().includes("reclame")) return; 

            gedraaideTracksNamen.unshift(nieuweAfgelopenTrackTitel);
            if (gedraaideTracksNamen.length > 2) gedraaideTracksNamen.pop(); // Max 2 op het briefje

            const historyList = document.getElementById('history-list');
            historyList.innerHTML = "";
            
            gedraaideTracksNamen.forEach(titel => {
                const li = document.createElement('li');
                li.className = "history-item";
                li.innerText = "- " + titel;
                historyList.appendChild(li);
            });
        }

        function playRandomTrack() {
            if (playlist.length === 0) return;

            const afgelopenTrackTitel = trackTitle.innerText;
            if (afgelopenTrackTitel && afgelopenTrackTitel !== "Laden..." && afgelopenTrackTitel !== "Monkey Beach FM") {
                updateGeschiedenisLijst(afgelopenTrackTitel);
            }

            if (errorTimeout) clearTimeout(errorTimeout);

            const currentTrack = getRandomTrack();
            vorigNummerUrl = currentTrack.url; 

            audioPlayer.src = currentTrack.url.replace("dl=0", "raw=1");
            trackTitle.innerText = currentTrack.title;
            statusDisplay.innerText = "Laden...";

            audioPlayer.load();

            if (isPlaying) {
                audioPlayer.play().then(() => {
                    statusDisplay.innerText = "";
                    activeerWakeLock();
                    updateMediaSession(currentTrack);
                }).catch(() => {
                    if (document.visibilityState === 'visible') {
                        errorTimeout = setTimeout(playRandomTrack, 2000);
                    }
                });
            }
        }

   function togglePlay() {
            startAchtergrondAudioHack();

            if (vorigNummerUrl === "") {
                const eersteTrack = getRandomTrack();
                vorigNummerUrl = eersteTrack.url;
                audioPlayer.src = eersteTrack.url.replace("dl=0", "raw=1");
                trackTitle.innerText = eersteTrack.title;
                audioPlayer.load();
            }

            if (isPlaying) {
                audioPlayer.pause();
                // Zet het Play-icoon (Driehoek) terug
                playBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" style="width: 1.2vw; height: 1.2vw;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
                playBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" style="width: 1.2vw; height: 1.2vw;"><path d="M8 5v14l11-7z"/></svg>`;
                statusDisplay.innerText = "PAUSE";
                isPlaying = false;
                stopWakeLock();
            } else {
                statusDisplay.innerText = "CONNECTING";
                audioPlayer.play().then(() => {
                    // Verander naar het Pause-icoon (Twee streepjes)
                    playBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" style="width: 1.2vw; height: 1.2vw;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
                    statusDisplay.innerText = "";
                    isPlaying = true;
                    activeerWakeLock();
                    const huidigeTrack = playlist.find(t => t.url === vorigNummerUrl) || playlist[0];
                    updateMediaSession(huidigeTrack);
                }).catch(() => {
                    isPlaying = true; 
                    playRandomTrack();
                });
            }
        }

        audioPlayer.onended = function() { playRandomTrack(); };
        audioPlayer.onerror = function() {
            statusDisplay.innerText = "RECONNECTING";
            if (errorTimeout) clearTimeout(errorTimeout);
            if (document.visibilityState === 'visible' && isPlaying) {
                errorTimeout = setTimeout(playRandomTrack, 2000);
            }
        };

        window.onload = function() {
            if(playlist.length > 0) {
                trackTitle.innerText = "Monkey Beach FM";
                statusDisplay.innerText = "Druk op Play Button";
                playBtn.disabled = false;
            }
            laadGoogleCastVeilig(); 
        };

        // ========================================================
        // APP-INSTALLATIE LOGICA
        // ========================================================
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
            } else {
                alert("Monkey Beach FM App Installatie:\n\n• iPhone (Safari): Tik onderin op 'Deel' en kies 'Zet op beginscherm'.\n\n• Android: Tik rechtsboven op de 3 stipjes en kies 'App installeren'.");
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/monkeybeachfm/sw.js', { scope: '/monkeybeachfm/' });
            });
        }

        // GOOGLE CAST & ACHTERGROND VEILIGHEID
        // ========================================================
        let castSession = null;
        function laadGoogleCastVeilig() {
            const script = document.createElement('script');
            script.src = "https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1";
            document.head.appendChild(script);
        }

        window.__onGCastApiAvailable = function(isAvailable) {
            if (isAvailable) initializeCastApi();
        };

        function initializeCastApi() {
            const context = cast.framework.CastContext.getInstance();
            context.setOptions({
                receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
                autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGINAL_SCOPED
            });
            context.addEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED, (event) => {
                if (event.sessionState === cast.framework.SessionState.SESSION_STARTED) {
                    castSession = context.getCurrentSession();
                    if (vorigNummerUrl === "") playRandomTrack();
                    else {
                        const huidigeTrack = playlist.find(t => t.url === vorigNummerUrl);
                        if(huidigeTrack) castMedia(huidigeTrack);
                    }
                }
            });
        }

        function startCasting() {
            const context = cast.framework.CastContext.getInstance();
            context.requestSession().then(() => {
                castSession = context.getCurrentSession();
                if (vorigNummerUrl !== "") {
                    const huidigeTrack = playlist.find(t => t.url === vorigNummerUrl);
                    if(huidigeTrack) castMedia(huidigeTrack);
                }
                else playRandomTrack();
            });
        }

        function castMedia(track) {
            if (!castSession) return;
            let streamUrl = track.url.replace("dl=0", "raw=1");
            const mediaInfo = new chrome.cast.media.MediaInfo(streamUrl, 'audio/mp3');
            mediaInfo.metadata = new chrome.cast.media.MusicTrackMediaMetadata();
            mediaInfo.metadata.title = track.title;
            mediaInfo.metadata.artist = "Monkey Beach FM";
            const request = new chrome.cast.media.LoadRequest(mediaInfo);
            castSession.getSessionObj().loadMedia(request, () => {}, () => {});
        }

        let wakeLock = null;
        async function activeerWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }
        function stopWakeLock() { if (wakeLock !== null) { wakeLock.release(); wakeLock = null; } }

        function updateMediaSession(track) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: track.title,
                    artist: 'Monkey Beach FM',
                    album: 'Tropische Radio'
                });
                navigator.mediaSession.setActionHandler('nexttrack', () => { playRandomTrack(); });
                navigator.mediaSession.setActionHandler('play', () => { togglePlay(); });
                navigator.mediaSession.setActionHandler('pause', () => { togglePlay(); });
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && isPlaying) {
                activeerWakeLock();
                startAchtergrondAudioHack();
                if (audioPlayer.paused && isPlaying) playRandomTrack();
            }
        });
    </script>
